pythonCmd: "python"
pythonPath: "C:/Users/yjlyl/Documents/GitHub/bilibili-api/server.py"
pythonPort: "9000"

initialDelay: 1
enableGetUpJob: 1
enableGetAuditStatus: 1
enableUploadJob: 1
enableRefreshNetCookie: 1
enableRestartJob: 1
enableRefreshBiliCookie: 1
enableRefreshUserVoiceList: 1

server:
  port: 25565
spring:
  datasource:
    url: #jdbc:mysql://127.0.0.1:3306/netmusic4?serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: #用户名
    password: #密码
    hikari:
      max-lifetime: 100000
    
  servlet:
    multipart:
      max-file-size: 100000000
      max-request-size: 100000000
  data:
    redis:
      host: #地址
      port: #端口
      password: #密码

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      table-underline: true
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    call-setters-on-nulls: true
