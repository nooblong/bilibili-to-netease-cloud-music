services:
  mysql:
    image: mysql:9
    container_name: btncm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: btncm_root
      MYSQL_DATABASE: netmusic
      MYSQL_USER: btncm
      MYSQL_PASSWORD: btncm
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./netmusic.sql:/docker-entrypoint-initdb.d/01-netmusic.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ubtncm -pbtncm_password --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  bilibili-api:
    build:
      context: ../bilibili-api
    image: btncm-bilibili-api:latest
    container_name: bilibili-api
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "9001:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 9000), 3); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 5

  java:
    build:
      context: .
    image: btncm-java:latest
    container_name: btncm-java
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      bilibili-api:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      PYTHON_HOST: bilibili-api
      PYTHON_PORT: 9000
      PYTHON_DOCKER_SERVICE: bilibili-api
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/netmusic?serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: btncm
      SPRING_DATASOURCE_PASSWORD: btncm
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  ui:
    build:
      context: ../bilibili-to-netease-cloud-music-ui
    image: btncm-ui:latest
    container_name: btncm-ui
    restart: unless-stopped
    depends_on:
      - java
    ports:
      - "80:80"

volumes:
  mysql-data:
